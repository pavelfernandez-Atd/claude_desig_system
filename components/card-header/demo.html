<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>card-header — Adthena DS Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wdth,wght@75,300;75,400;75,600;100,300;100,400;100,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="card-header.css">
</head>
<body style="padding:32px;background:#f0f2f5;font-family:'Open Sans',sans-serif">
<div style="max-width:600px;display:flex;flex-direction:column;gap:16px">
  <!-- Standalone card header -->
  <div class="card-header card-header--standalone">
    <div class="card-header__roundel">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="10" rx="2" stroke="white" stroke-width="1.3"/><path d="M1 6h14" stroke="white" stroke-width="1.3"/></svg>
    </div>
    <div class="card-header__title-section">
      <div class="card-header__title-row">
        <span class="card-header__title">Share of Voice</span>
      </div>
      <span class="card-header__subtitle">Impressions · 1 May – 31 May 2025</span>
    </div>
    <div class="card-header__actions">
      <button class="card-header__action-btn" aria-label="Download">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path stroke="#485982" stroke-width="1.3" stroke-linecap="round" d="M7 2v7M4 7l3 3 3-3M2 12h10"/></svg>
      </button>
      <button class="card-header__action-btn" aria-label="More options">
        <svg width="3" height="13" viewBox="0 0 3 13" fill="none"><circle cx="1.5" cy="1.5" r="1.5" fill="#485982"/><circle cx="1.5" cy="6.5" r="1.5" fill="#485982"/><circle cx="1.5" cy="11.5" r="1.5" fill="#485982"/></svg>
      </button>
    </div>
  </div>
  <!-- Card header as top of card -->
  <div style="border-radius:12px;box-shadow:0 0 16px rgba(23,42,68,0.12);overflow:hidden">
    <div class="card-header">
      <div class="card-header__title-section">
        <div class="card-header__title-row">
          <span class="card-header__title">Keyword Landscape</span>
        </div>
        <span class="card-header__subtitle">Top performing keywords this month</span>
      </div>
      <div class="card-header__actions">
        <button class="card-header__action-btn" aria-label="Info">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="#485982" stroke-width="1.3"/><path d="M7 6v4" stroke="#485982" stroke-width="1.5" stroke-linecap="round"/><circle cx="7" cy="4" r="0.75" fill="#485982"/></svg>
        </button>
      </div>
    </div>
    <div style="padding:24px;background:white;font-family:var(--font-base);font-size:13px;color:#858585">Card content area</div>
  </div>
</div>

</body>
</html>
