<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>chartset-donut-lines — Adthena DS Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wdth,wght@75,300;75,400;75,600;100,300;100,400;100,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="chartset-donut-lines.css">
</head>
<body style="padding:32px;background:#f0f2f5;font-family:'Open Sans',sans-serif">
<div style="background:#fff;border-radius:12px;padding:24px;max-width:700px">
  <div class="chartset-donut-lines" id="chartset-demo">
    <div>
      <div class="donut-chart" id="chartset-donut">
        <svg class="donut-chart__svg" viewBox="0 0 248 248"></svg>
        <div class="donut-chart__label">
          <div class="donut-chart__value-row">
            <span class="donut-chart__value">42</span>
            <span class="donut-chart__unit">%</span>
          </div>
          <span class="donut-chart__subtitle">Impression<br>Share</span>
        </div>
      </div>
    </div>
    <div class="chartset-timeline">
      <svg class="chartset-timeline__svg" id="chartset-svg"></svg>
    </div>
  </div>
</div>
<script src="chartset-donut-lines.js"></script>
</body>
</html>
