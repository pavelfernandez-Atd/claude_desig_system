<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>button — Adthena DS Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wdth,wght@75,300;75,400;75,600;100,300;100,400;100,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="button.css">
</head>
<body style="padding:32px;background:#f0f2f5;font-family:'Open Sans',sans-serif">
<div style="display:flex;flex-direction:column;gap:20px">
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <button class="btn btn--primary">Primary</button>
    <button class="btn btn--secondary">Secondary</button>
    <button class="btn btn--plain">Plain</button>
    <button class="btn btn--outlined">Outlined</button>
    <button class="btn btn--red">Red</button>
    <button class="btn btn--green">Green</button>
    <button class="btn btn--disabled" disabled>Disabled</button>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <button class="btn btn--sm btn--primary">Small Primary</button>
    <button class="btn btn--sm btn--secondary">Small Secondary</button>
    <button class="btn btn--sm btn--outlined">Small Outlined</button>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <button class="btn btn--icon-primary" aria-label="Add">
      <span class="btn__icon"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path stroke="white" stroke-width="1.5" stroke-linecap="round" d="M7 2v10M2 7h10"/></svg></span>
    </button>
    <button class="btn btn--icon-secondary" aria-label="Filter">
      <span class="btn__icon"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path stroke="#3079bd" stroke-width="1.5" stroke-linecap="round" d="M1 3h12M3 7h8M5 11h4"/></svg></span>
    </button>
    <button class="btn btn--icon-outlined" aria-label="More">
      <span class="btn__icon"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="3" r="1.2" fill="#3079bd"/><circle cx="7" cy="7" r="1.2" fill="#3079bd"/><circle cx="7" cy="11" r="1.2" fill="#3079bd"/></svg></span>
    </button>
  </div>
</div>

</body>
</html>
