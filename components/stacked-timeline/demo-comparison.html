<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stacked Timeline + Comparison — Adthena DS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wdth,wght@0,75,300..700;0,100,300..700;1,75,300..700;1,100,300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="stacked-timeline.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #e5eef5;
      font-family: 'Open Sans', sans-serif;
      padding: 32px;
      min-height: 100vh;
    }
    .demo-card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      max-width: 800px;
      margin: 0 auto;
    }
    .demo-card__title {
      font-size: 16px;
      font-weight: 600;
      color: rgba(0,0,0,0.87);
      margin-bottom: 4px;
    }
    .demo-card__sub {
      font-size: 13px;
      color: #6b6b6b;
      margin-bottom: 20px;
    }
    .demo-bg {
      background: #e4eef4;
      border-radius: 12px;
      padding: 20px;
    }

    /* Legend group labels */
    .slt-legend-group {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    .slt-legend-group-label {
      font-family: 'Open Sans', sans-serif;
      font-size: 11px;
      font-weight: 600;
      font-stretch: condensed;
      color: #6b6b6b;
      letter-spacing: 0.4px;
      white-space: nowrap;
    }
    .slt-legend-divider {
      width: 1px;
      height: 14px;
      background: rgba(0,0,0,0.15);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="demo-card">
    <div class="demo-card__title">Stacked Timeline — With Comparison Lines</div>
    <div class="demo-card__sub">4 series · Jan–Jun 2026 · vs. Industry Average (dotted)</div>

    <div class="demo-bg">
      <div class="stacked-timeline">
        <!--
          viewBox: 740 × 215
          yOf(pct) = 188 − (pct/100) × 170

          YOUR DATA
          Ads Below AIO  #e86492  [22,20,24,22,21,25]
          Ads Inside AIO #b3a2e7  [18,19,21,20,19,22]
          Ads Above AIO  #8ac8b1  [30,29,27,25,25,22]
          No Ads         #E4E8F2  [30,32,28,33,35,31]

          Main cumulative boundaries:
            Below   → y=[151,154,147,151,152,146]
            +Inside → y=[120,122,112,117,120,108]
            +Above  → y=[ 69, 72,  66,  74,  78,  71]

          INDUSTRY AVERAGE (dotted comparison lines)
          Ads Below AIO  [28,27,30,26,24,28]
          Ads Inside AIO [22,21,23,22,21,23]
          Ads Above AIO  [25,26,24,26,27,24]
          No Ads         [25,26,23,26,28,25]

          Comparison cumulative boundaries:
            Below   → y=[140,142,137,144,147,140]
            +Inside → y=[103,106, 98,106,112,101]
            +Above  → y=[ 60, 62,  57,  62,  66,  60]
        -->
        <svg id="sltc-svg" class="stacked-timeline__svg" viewBox="0 0 740 215" xmlns="http://www.w3.org/2000/svg">

          <!-- grid lines at 0% / 25% / 50% / 75% / 100% -->
          <line x1="48" y1="18"  x2="710" y2="18"  stroke="#dce3ef" stroke-width="1"/>
          <line x1="48" y1="61"  x2="710" y2="61"  stroke="#dce3ef" stroke-width="1"/>
          <line x1="48" y1="103" x2="710" y2="103" stroke="#dce3ef" stroke-width="1"/>
          <line x1="48" y1="146" x2="710" y2="146" stroke="#dce3ef" stroke-width="1"/>
          <line x1="48" y1="188" x2="710" y2="188" stroke="#dce3ef" stroke-width="1"/>

          <!-- Y-axis labels -->
          <text x="43" y="22"  text-anchor="end" font-family="Open Sans,sans-serif" font-stretch="condensed" font-size="13" fill="#38476a">100%</text>
          <text x="43" y="107" text-anchor="end" font-family="Open Sans,sans-serif" font-stretch="condensed" font-size="13" fill="#38476a">50%</text>
          <text x="43" y="192" text-anchor="end" font-family="Open Sans,sans-serif" font-stretch="condensed" font-size="13" fill="#38476a">0%</text>

          <!-- Band 1 — Ads Below AIO — Crimson #e86492 (bottom) -->
          <polygon
            points="48,188 180,188 312,188 445,188 578,188 710,188
                    710,146 578,152 445,151 312,147 180,154 48,151"
            fill="#e86492" fill-opacity="0.9"/>

          <!-- Band 2 — Ads Inside AIO — Purple #b3a2e7 -->
          <polygon
            points="48,151 180,154 312,147 445,151 578,152 710,146
                    710,108 578,120 445,117 312,112 180,122 48,120"
            fill="#b3a2e7" fill-opacity="0.9"/>

          <!-- Band 3 — Ads Above AIO — Green #8ac8b1 -->
          <polygon
            points="48,120 180,122 312,112 445,117 578,120 710,108
                    710,71 578,78 445,74 312,66 180,72 48,69"
            fill="#8ac8b1" fill-opacity="0.9"/>

          <!-- Band 4 — No Ads — Neutral/50 #E4E8F2 (top) -->
          <polygon
            points="48,69 180,72 312,66 445,74 578,78 710,71
                    710,18 578,18 445,18 312,18 180,18 48,18"
            fill="#E4E8F2" fill-opacity="0.9"/>

          <!-- white boundary lines between main bands -->
          <polyline points="48,151 180,154 312,147 445,151 578,152 710,146" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
          <polyline points="48,120 180,122 312,112 445,117 578,120 710,108" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
          <polyline points="48,69  180,72  312,66  445,74  578,78  710,71"  fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>

          <!-- ═══ COMPARISON LINES — Industry Average (dashed) ═══ -->

          <!-- Comparison: Below boundary y=[140,142,137,144,147,140] -->
          <polyline
            points="48,140 180,142 312,137 445,144 578,147 710,140"
            fill="none" stroke="#e86492" stroke-width="2" stroke-dasharray="6,4" opacity="0.85"/>

          <!-- Comparison: Inside boundary y=[103,106,98,106,112,101] -->
          <polyline
            points="48,103 180,106 312,98 445,106 578,112 710,101"
            fill="none" stroke="#b3a2e7" stroke-width="2" stroke-dasharray="6,4" opacity="0.85"/>

          <!-- Comparison: Above boundary y=[60,62,57,62,66,60] -->
          <polyline
            points="48,60 180,62 312,57 445,62 578,66 710,60"
            fill="none" stroke="#8ac8b1" stroke-width="2" stroke-dasharray="6,4" opacity="0.85"/>

          <!-- vertical indicator line — rendered before dots -->
          <line id="sltc-indicator" x1="0" y1="18" x2="0" y2="188"
                stroke="rgba(0,0,0,0.35)" stroke-width="1" stroke-dasharray="3,2"
                style="display:none"/>

          <!-- ═══ MAIN DATA DOTS — filled, r=5.5 ═══ -->
          <!-- Ads Below AIO tops: y=[151,154,147,151,152,146] -->
          <circle class="sltc-dot" data-col="0" cx="48"  cy="151" r="5.5" fill="#e86492" stroke="white" stroke-width="2" opacity="0"/>
          <circle class="sltc-dot" data-col="1" cx="180" cy="154" r="5.5" fill="#e86492" stroke="white" stroke-width="2" opacity="0"/>
          <circle class="sltc-dot" data-col="2" cx="312" cy="147" r="5.5" fill="#e86492" stroke="white" stroke-width="2" opacity="0"/>
          <circle class="sltc-dot" data-col="3" cx="445" cy="151" r="5.5" fill="#e86492" stroke="white" stroke-width="2" opacity="0"/>
          <circle class="sltc-dot" data-col="4" cx="578" cy="152" r="5.5" fill="#e86492" stroke="white" stroke-width="2" opacity="0"/>
          <circle class="sltc-dot" data-col="5" cx="710" cy="146" r="5.5" fill="#e86492" stroke="white" stroke-width="2" opacity="0"/>
          <!-- Ads Inside AIO tops: y=[120,122,112,117,120,108] -->
          <circle class="sltc-dot" data-col="0" cx="48"  cy="120" r="5.5" fill="#b3a2e7" stroke="white" stroke-width="2" opacity="0"/>
          <circle class="sltc-dot" data-col="1" cx="180" cy="122" r="5.5" fill="#b3a2e7" stroke="white" stroke-width="2" opacity="0"/>
          <circle class="sltc-dot" data-col="2" cx="312" cy="112" r="5.5" fill="#b3a2e7" stroke="white" stroke-width="2" opacity="0"/>
          <circle class="sltc-dot" data-col="3" cx="445" cy="117" r="5.5" fill="#b3a2e7" stroke="white" stroke-width="2" opacity="0"/>
          <circle class="sltc-dot" data-col="4" cx="578" cy="120" r="5.5" fill="#b3a2e7" stroke="white" stroke-width="2" opacity="0"/>
          <circle class="sltc-dot" data-col="5" cx="710" cy="108" r="5.5" fill="#b3a2e7" stroke="white" stroke-width="2" opacity="0"/>
          <!-- Ads Above AIO tops: y=[69,72,66,74,78,71] -->
          <circle class="sltc-dot" data-col="0" cx="48"  cy="69"  r="5.5" fill="#8ac8b1" stroke="white" stroke-width="2" opacity="0"/>
          <circle class="sltc-dot" data-col="1" cx="180" cy="72"  r="5.5" fill="#8ac8b1" stroke="white" stroke-width="2" opacity="0"/>
          <circle class="sltc-dot" data-col="2" cx="312" cy="66"  r="5.5" fill="#8ac8b1" stroke="white" stroke-width="2" opacity="0"/>
          <circle class="sltc-dot" data-col="3" cx="445" cy="74"  r="5.5" fill="#8ac8b1" stroke="white" stroke-width="2" opacity="0"/>
          <circle class="sltc-dot" data-col="4" cx="578" cy="78"  r="5.5" fill="#8ac8b1" stroke="white" stroke-width="2" opacity="0"/>
          <circle class="sltc-dot" data-col="5" cx="710" cy="71"  r="5.5" fill="#8ac8b1" stroke="white" stroke-width="2" opacity="0"/>
          <!-- No Ads tops: y=18 (always 100%) -->
          <circle class="sltc-dot" data-col="0" cx="48"  cy="18"  r="5.5" fill="#E4E8F2" stroke="#aabcce" stroke-width="2" opacity="0"/>
          <circle class="sltc-dot" data-col="1" cx="180" cy="18"  r="5.5" fill="#E4E8F2" stroke="#aabcce" stroke-width="2" opacity="0"/>
          <circle class="sltc-dot" data-col="2" cx="312" cy="18"  r="5.5" fill="#E4E8F2" stroke="#aabcce" stroke-width="2" opacity="0"/>
          <circle class="sltc-dot" data-col="3" cx="445" cy="18"  r="5.5" fill="#E4E8F2" stroke="#aabcce" stroke-width="2" opacity="0"/>
          <circle class="sltc-dot" data-col="4" cx="578" cy="18"  r="5.5" fill="#E4E8F2" stroke="#aabcce" stroke-width="2" opacity="0"/>
          <circle class="sltc-dot" data-col="5" cx="710" cy="18"  r="5.5" fill="#E4E8F2" stroke="#aabcce" stroke-width="2" opacity="0"/>

          <!-- ═══ COMPARISON DOTS — hollow (white fill, coloured stroke) ═══ -->
          <!-- Below boundary: y=[140,142,137,144,147,140] -->
          <circle class="sltc-comp-dot" data-col="0" cx="48"  cy="140" r="4.5" fill="white" stroke="#e86492" stroke-width="2.5" opacity="0"/>
          <circle class="sltc-comp-dot" data-col="1" cx="180" cy="142" r="4.5" fill="white" stroke="#e86492" stroke-width="2.5" opacity="0"/>
          <circle class="sltc-comp-dot" data-col="2" cx="312" cy="137" r="4.5" fill="white" stroke="#e86492" stroke-width="2.5" opacity="0"/>
          <circle class="sltc-comp-dot" data-col="3" cx="445" cy="144" r="4.5" fill="white" stroke="#e86492" stroke-width="2.5" opacity="0"/>
          <circle class="sltc-comp-dot" data-col="4" cx="578" cy="147" r="4.5" fill="white" stroke="#e86492" stroke-width="2.5" opacity="0"/>
          <circle class="sltc-comp-dot" data-col="5" cx="710" cy="140" r="4.5" fill="white" stroke="#e86492" stroke-width="2.5" opacity="0"/>
          <!-- Inside boundary: y=[103,106,98,106,112,101] -->
          <circle class="sltc-comp-dot" data-col="0" cx="48"  cy="103" r="4.5" fill="white" stroke="#b3a2e7" stroke-width="2.5" opacity="0"/>
          <circle class="sltc-comp-dot" data-col="1" cx="180" cy="106" r="4.5" fill="white" stroke="#b3a2e7" stroke-width="2.5" opacity="0"/>
          <circle class="sltc-comp-dot" data-col="2" cx="312" cy="98"  r="4.5" fill="white" stroke="#b3a2e7" stroke-width="2.5" opacity="0"/>
          <circle class="sltc-comp-dot" data-col="3" cx="445" cy="106" r="4.5" fill="white" stroke="#b3a2e7" stroke-width="2.5" opacity="0"/>
          <circle class="sltc-comp-dot" data-col="4" cx="578" cy="112" r="4.5" fill="white" stroke="#b3a2e7" stroke-width="2.5" opacity="0"/>
          <circle class="sltc-comp-dot" data-col="5" cx="710" cy="101" r="4.5" fill="white" stroke="#b3a2e7" stroke-width="2.5" opacity="0"/>
          <!-- Above boundary: y=[60,62,57,62,66,60] -->
          <circle class="sltc-comp-dot" data-col="0" cx="48"  cy="60" r="4.5" fill="white" stroke="#8ac8b1" stroke-width="2.5" opacity="0"/>
          <circle class="sltc-comp-dot" data-col="1" cx="180" cy="62" r="4.5" fill="white" stroke="#8ac8b1" stroke-width="2.5" opacity="0"/>
          <circle class="sltc-comp-dot" data-col="2" cx="312" cy="57" r="4.5" fill="white" stroke="#8ac8b1" stroke-width="2.5" opacity="0"/>
          <circle class="sltc-comp-dot" data-col="3" cx="445" cy="62" r="4.5" fill="white" stroke="#8ac8b1" stroke-width="2.5" opacity="0"/>
          <circle class="sltc-comp-dot" data-col="4" cx="578" cy="66" r="4.5" fill="white" stroke="#8ac8b1" stroke-width="2.5" opacity="0"/>
          <circle class="sltc-comp-dot" data-col="5" cx="710" cy="60" r="4.5" fill="white" stroke="#8ac8b1" stroke-width="2.5" opacity="0"/>

          <!-- invisible hit rect for hover -->
          <rect id="sltc-hit" x="48" y="18" width="662" height="170" fill="transparent" style="cursor:crosshair"/>

          <!-- X-axis labels -->
          <text x="48"  y="210" text-anchor="start" font-family="Open Sans,sans-serif" font-stretch="condensed" font-size="13" fill="#38476a">1 Jan, 2026</text>
          <text x="710" y="210" text-anchor="end"   font-family="Open Sans,sans-serif" font-stretch="condensed" font-size="13" fill="#38476a">1 Jun, 2026</text>
        </svg>

        <!-- Legend: single row -->
        <div class="stacked-timeline__legend" style="gap:10px;align-items:center;justify-content:center;flex-wrap:wrap">
          <span class="slt-legend-group-label">You</span>
          <div class="stacked-timeline__legend-item"><svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4" fill="#8ac8b1"/></svg>Above</div>
          <div class="stacked-timeline__legend-item"><svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4" fill="#b3a2e7"/></svg>Inside</div>
          <div class="stacked-timeline__legend-item"><svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4" fill="#e86492"/></svg>Below</div>
          <div class="stacked-timeline__legend-item"><svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4" fill="#E4E8F2"/></svg>No Ads</div>
          <div class="slt-legend-divider"></div>
          <span class="slt-legend-group-label">Top 10 Comp.</span>
          <div class="stacked-timeline__legend-item"><svg width="20" height="8" viewBox="0 0 20 8"><line x1="0" y1="4" x2="20" y2="4" stroke="#8ac8b1" stroke-width="2" stroke-dasharray="5,3"/></svg>Above</div>
          <div class="stacked-timeline__legend-item"><svg width="20" height="8" viewBox="0 0 20 8"><line x1="0" y1="4" x2="20" y2="4" stroke="#b3a2e7" stroke-width="2" stroke-dasharray="5,3"/></svg>Inside</div>
          <div class="stacked-timeline__legend-item"><svg width="20" height="8" viewBox="0 0 20 8"><line x1="0" y1="4" x2="20" y2="4" stroke="#e86492" stroke-width="2" stroke-dasharray="5,3"/></svg>Below</div>
        </div>
      </div>
      <div id="sltc-tooltip" class="stacked-timeline__tooltip"></div>
    </div>
  </div>

  <script>
  (function(){
    var svg       = document.getElementById('sltc-svg');
    var hit       = document.getElementById('sltc-hit');
    var indicator = document.getElementById('sltc-indicator');
    var tip       = document.getElementById('sltc-tooltip');
    var dots      = svg.querySelectorAll('.sltc-dot');
    var compDots  = svg.querySelectorAll('.sltc-comp-dot');
    if (!svg || !hit || !tip) return;

    var DATES = ['1 Jan, 2026','1 Feb, 2026','1 Mar, 2026','1 Apr, 2026','1 May, 2026','1 Jun, 2026'];
    var XS    = [48, 180, 312, 445, 578, 710];

    var SERIES = [
      { name:'Ads Below AIO',   color:'#e86492', values:[22,20,24,22,21,25] },
      { name:'Ads Inside AIO',  color:'#b3a2e7', values:[18,19,21,20,19,22] },
      { name:'Ads Above AIO',   color:'#8ac8b1', values:[30,29,27,25,25,22] },
      { name:'No Ads',          color:'#E4E8F2', values:[30,32,28,33,35,31] }
    ];

    var COMP = [
      { name:'Ads Below AIO',   color:'#e86492', values:[28,27,30,26,24,28] },
      { name:'Ads Inside AIO',  color:'#b3a2e7', values:[22,21,23,22,21,23] },
      { name:'Ads Above AIO',   color:'#8ac8b1', values:[25,26,24,26,27,24] },
      { name:'No Ads',          color:'#E4E8F2', values:[25,26,23,26,28,25] }
    ];

    function svgX(e) {
      var r = svg.getBoundingClientRect();
      return (e.clientX - r.left) * (740 / r.width);
    }

    function nearest(sx) {
      var best = 0, dist = Infinity;
      XS.forEach(function(x, i) { var d = Math.abs(x - sx); if (d < dist) { dist = d; best = i; } });
      return best;
    }

    hit.addEventListener('mousemove', function(e) {
      var idx = nearest(svgX(e));

      indicator.setAttribute('x1', XS[idx]);
      indicator.setAttribute('x2', XS[idx]);
      indicator.style.display = 'block';

      dots.forEach(function(d) {
        d.setAttribute('opacity', d.dataset.col == idx ? '1' : '0');
      });
      compDots.forEach(function(d) {
        d.setAttribute('opacity', d.dataset.col == idx ? '1' : '0');
      });

      /* ── tooltip ── */
      var row = function(color, name, val, hollow) {
        var swatch = hollow
          ? '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:white;border:2px solid ' + color + ';flex-shrink:0"></span>'
          : '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + color + ';flex-shrink:0"></span>';
        return '<div style="display:flex;align-items:center;gap:7px;font-size:12px;color:#fff;line-height:1.8">'
          + swatch
          + '<span style="flex:1;white-space:nowrap">' + name + '</span>'
          + '<span style="font-weight:600;padding-left:10px">' + val + '%</span>'
          + '</div>';
      };

      var html = '<div style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.7);margin-bottom:8px;letter-spacing:0.3px">' + DATES[idx] + '</div>';

      /* Your data section */
      html += '<div style="font-size:10px;font-weight:600;color:rgba(255,255,255,0.45);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:3px">You</div>';
      SERIES.forEach(function(s) { html += row(s.color, s.name, s.values[idx], false); });

      /* Top 10 Competitors section */
      html += '<div style="margin-top:8px;padding-top:7px;border-top:1px solid rgba(255,255,255,0.15)">';
      html += '<div style="font-size:10px;font-weight:600;color:rgba(255,255,255,0.45);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:3px">Top 10 Competitors</div>';
      COMP.forEach(function(s) { html += row(s.color, s.name, s.values[idx], true); });
      html += '</div>';

      tip.innerHTML = html;
      tip.style.display  = 'block';
      tip.style.left     = (e.clientX + 16) + 'px';
      tip.style.top      = (e.clientY - 90) + 'px';
    });

    hit.addEventListener('mouseleave', function() {
      tip.style.display       = 'none';
      indicator.style.display = 'none';
      dots.forEach(function(d)     { d.setAttribute('opacity', '0'); });
      compDots.forEach(function(d) { d.setAttribute('opacity', '0'); });
    });
  })();
  </script>
</body>
</html>
