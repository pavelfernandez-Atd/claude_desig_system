<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sub-tab — Adthena DS Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wdth,wght@75,300;75,400;75,600;100,300;100,400;100,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sub-tab.css">
</head>
<body style="padding:32px;background:#f0f2f5;font-family:'Open Sans',sans-serif">
<div style="display:flex;flex-direction:column;gap:24px">
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <div class="subtab">Default</div>
    <div class="subtab subtab--active">Active</div>
    <div class="subtab subtab--highlighted">Highlighted</div>
    <div class="subtab">With Badge <span class="subtab__badge">3</span></div>
    <div class="subtab subtab--active">Active Badge <span class="subtab__badge">5</span></div>
  </div>
  <div style="background:#fafafa;border-radius:40px;padding:6px;display:inline-flex;gap:4px">
    <div class="subtab subtab--active">Overview</div>
    <div class="subtab">Performance <span class="subtab__badge">12</span></div>
    <div class="subtab">Competitors</div>
    <div class="subtab">Keywords <span class="subtab__badge">5</span></div>
  </div>
</div>

</body>
</html>
