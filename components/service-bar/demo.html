<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>service-bar — Adthena DS Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wdth,wght@75,300;75,400;75,600;100,300;100,400;100,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="service-bar.css">
</head>
<body style="padding:32px;background:#f0f2f5;font-family:'Open Sans',sans-serif">
<div style="max-width:700px">
  <div class="service-bar">
    <div class="service-bar__header">
      <div class="service-bar__avatar">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="white" stroke-width="1.5"/><path d="M7 10l2 2 4-4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="service-bar__text">
        <div class="service-bar__title">Search Intelligence</div>
        <div class="service-bar__subtitle">adthena.com · UK · All Devices</div>
      </div>
      <div class="service-bar__actions">
        <div class="service-bar__date">
          <svg width="14" height="15" viewBox="0 0 14 15" fill="none" style="flex-shrink:0">
            <rect x="0.5" y="1.5" width="13" height="13" rx="2" stroke="#2f78bd"/>
            <path d="M0.5 5.5h13" stroke="#2f78bd"/>
            <path d="M4 0.5v2M10 0.5v2" stroke="#2f78bd" stroke-linecap="round"/>
          </svg>
          <span class="service-bar__date-label">Last 30 Days</span>
        </div>
      </div>
    </div>
    <div class="service-bar__tabs">
      <div class="tab-item tab-item--active">Overview</div>
      <div class="tab-item">Share of Voice</div>
      <div class="tab-item">Keywords</div>
      <div class="tab-item">Ads</div>
    </div>
    <div class="service-bar__filters">
      <div class="service-bar__filter-row">
        <button class="service-bar__filter-btn">
          All Devices
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="#334557" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="service-bar__filter-btn">
          Search Term Groups
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="#334557" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="service-bar__filter-btn">
          Search Terms
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="#334557" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

</body>
</html>
