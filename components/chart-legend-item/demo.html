<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>chart-legend-item — Adthena DS Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wdth,wght@75,300;75,400;75,600;100,300;100,400;100,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="chart-legend-item.css">
</head>
<body style="padding:32px;background:#f0f2f5;font-family:'Open Sans',sans-serif">
<div style="display:flex;flex-direction:column;gap:4px;background:#fff;padding:16px;border-radius:12px;max-width:240px">
  <div class="chart-legend-item">
    <span class="chart-legend-item__dot" style="background:#4a9ef8"></span>
    <span class="chart-legend-item__label chart-legend-item__label--brand">Your Brand</span>
  </div>
  <div class="chart-legend-item">
    <span class="chart-legend-item__dot" style="background:#79cbd2"></span>
    <span class="chart-legend-item__label">Bupa</span>
  </div>
  <div class="chart-legend-item">
    <span class="chart-legend-item__dot" style="background:#d47dd4"></span>
    <span class="chart-legend-item__label">AXA Health</span>
  </div>
  <div class="chart-legend-item csd-series--off">
    <span class="chart-legend-item__dot" style="background:#b3a2e7"></span>
    <span class="chart-legend-item__label">Vitality (hidden)</span>
  </div>
</div>

</body>
</html>
