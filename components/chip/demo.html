<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>chip — Adthena DS Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wdth,wght@75,300;75,400;75,600;100,300;100,400;100,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="chip.css">
</head>
<body style="padding:32px;background:#f0f2f5;font-family:'Open Sans',sans-serif">
<div style="display:flex;flex-direction:column;gap:16px">
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <span class="ds-chip ds-chip--outlined ds-chip--blue"><span class="ds-chip__label">Outlined Blue</span></span>
    <span class="ds-chip ds-chip--outlined ds-chip--green"><span class="ds-chip__label">Outlined Green</span></span>
    <span class="ds-chip ds-chip--outlined ds-chip--red"><span class="ds-chip__label">Outlined Red</span></span>
    <span class="ds-chip ds-chip--outlined ds-chip--orange"><span class="ds-chip__label">Outlined Orange</span></span>
    <span class="ds-chip ds-chip--outlined ds-chip--neutral"><span class="ds-chip__label">Outlined Neutral</span></span>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <span class="ds-chip ds-chip--light ds-chip--blue"><span class="ds-chip__label">Light Blue</span></span>
    <span class="ds-chip ds-chip--light ds-chip--green"><span class="ds-chip__label">Light Green</span></span>
    <span class="ds-chip ds-chip--light ds-chip--red"><span class="ds-chip__label">Light Red</span></span>
    <span class="ds-chip ds-chip--light ds-chip--purple"><span class="ds-chip__label">Light Purple</span></span>
    <span class="ds-chip ds-chip--light ds-chip--teal"><span class="ds-chip__label">Light Teal</span></span>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <span class="ds-chip ds-chip--dark ds-chip--blue"><span class="ds-chip__label">Dark Blue</span></span>
    <span class="ds-chip ds-chip--dark ds-chip--green"><span class="ds-chip__label">Dark Green</span></span>
    <span class="ds-chip ds-chip--dark ds-chip--red"><span class="ds-chip__label">Dark Red</span></span>
    <span class="ds-chip ds-chip--dark ds-chip--navy"><span class="ds-chip__label">Dark Navy</span></span>
    <span class="ds-chip ds-chip--dark ds-chip--neutral"><span class="ds-chip__label">Dark Neutral</span></span>
  </div>
</div>

</body>
</html>
