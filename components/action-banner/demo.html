<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>action-banner — Adthena DS Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wdth,wght@75,300;75,400;75,600;100,300;100,400;100,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="action-banner.css">
</head>
<body style="padding:32px;background:#f0f2f5;font-family:'Open Sans',sans-serif">
<div style="max-width:480px;display:flex;flex-direction:column;gap:12px">
  <div class="action-banner">
    <div class="action-banner__icon-wrap">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1l1.5 4.5H13l-3.75 2.75L10.5 13 7 10.25 3.5 13l1.25-4.75L1 5.5h4.5L7 1z" stroke="#5a7a2a" stroke-width="1.2" stroke-linejoin="round" fill="none"/></svg>
    </div>
    <div class="action-banner__text">
      <span class="action-banner__label">Action</span>
      <div class="action-banner__body">
        <p>Consider the following optimisations to improve your click share:</p>
        <ul>
          <li>Increase bids on branded keywords</li>
          <li>Add negative keywords for irrelevant terms</li>
          <li>Test new ad copy variations</li>
        </ul>
      </div>
    </div>
  </div>
</div>

</body>
</html>
