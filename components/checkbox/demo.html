<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>checkbox — Adthena DS Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wdth,wght@75,300;75,400;75,600;100,300;100,400;100,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="checkbox.css">
</head>
<body style="padding:32px;background:#f0f2f5;font-family:'Open Sans',sans-serif">
<div style="display:flex;flex-direction:column;gap:12px;background:#fff;padding:24px;border-radius:12px;max-width:280px">
  <label class="ds-checkbox-label">
    <input type="checkbox" class="ds-checkbox-input"> Default unchecked
  </label>
  <label class="ds-checkbox-label">
    <input type="checkbox" class="ds-checkbox-input" checked> Checked
  </label>
  <label class="ds-checkbox-label ds-checkbox-label--disabled">
    <input type="checkbox" class="ds-checkbox-input" disabled> Disabled unchecked
  </label>
  <label class="ds-checkbox-label ds-checkbox-label--disabled">
    <input type="checkbox" class="ds-checkbox-input" disabled checked> Disabled checked
  </label>
</div>

</body>
</html>
