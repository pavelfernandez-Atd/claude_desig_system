<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>insight-banner — Adthena DS Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wdth,wght@75,300;75,400;75,600;100,300;100,400;100,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="insight-banner.css">
</head>
<body style="padding:32px;background:#f0f2f5;font-family:'Open Sans',sans-serif">
<div style="max-width:480px;display:flex;flex-direction:column;gap:12px">
  <div class="insight-banner">
    <div class="insight-banner__icon-wrap">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="#3589e9" stroke-width="1.3"/><path d="M7 4v4" stroke="#3589e9" stroke-width="1.5" stroke-linecap="round"/><circle cx="7" cy="10" r="0.75" fill="#3589e9"/></svg>
    </div>
    <div class="insight-banner__text">
      <span class="insight-banner__label">Insight</span>
      <p class="insight-banner__body">Bupa has increased its ad spend by 23% over the last 30 days, targeting your top 5 keywords with new ad copy.</p>
    </div>
  </div>
</div>

</body>
</html>
