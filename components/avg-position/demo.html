<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>avg-position — Adthena DS Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wdth,wght@75,300;75,400;75,600;100,300;100,400;100,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="avg-position.css">
</head>
<body style="padding:32px;background:#f0f2f5;font-family:'Open Sans',sans-serif">
<div style="background:#fff;border-radius:12px;padding:24px;max-width:360px">
  <div class="cit-pos__list">
    <div class="cit-pos__row">
      <span class="cit-pos__num cit-pos__num--brand">1</span>
      <div class="cit-pos__favicon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="#496f97" stroke-width="1.2"/></svg>
      </div>
      <div class="cit-pos__domain cit-pos__domain--brand">axahealth.co.uk</div>
      <span class="cit-pos__delta cit-pos__delta--up">+2</span>
    </div>
    <div class="cit-pos__row">
      <span class="cit-pos__num">2</span>
      <div class="cit-pos__favicon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="#496f97" stroke-width="1.2"/></svg>
      </div>
      <div class="cit-pos__domain">bupa.co.uk</div>
      <span class="cit-pos__delta cit-pos__delta--down">-1</span>
    </div>
    <div class="cit-pos__row">
      <span class="cit-pos__num">3</span>
      <div class="cit-pos__favicon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="#496f97" stroke-width="1.2"/></svg>
      </div>
      <div class="cit-pos__domain">vitality.co.uk</div>
      <span class="cit-pos__delta cit-pos__delta--flat">—</span>
    </div>
    <div class="cit-pos__row">
      <span class="cit-pos__num">4</span>
      <div class="cit-pos__favicon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="#496f97" stroke-width="1.2"/></svg>
      </div>
      <div class="cit-pos__domain">simply-health.co.uk</div>
      <span class="cit-pos__delta cit-pos__delta--up">+1</span>
    </div>
  </div>
</div>

</body>
</html>
