<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timeline Chart — Adthena DS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wdth,wght@0,75,300..700;0,100,300..700;1,75,300..700;1,100,300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="timeline-chart.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #e4eef4; font-family: 'Open Sans', sans-serif; padding: 32px; min-height: 100vh; }
    .demo-card { background: #fff; border-radius: 12px; padding: 24px; max-width: 820px; margin: 0 auto; }
    .demo-card__title { font-size: 16px; font-weight: 600; color: rgba(0,0,0,0.87); margin-bottom: 4px; }
    .demo-card__sub { font-size: 13px; color: #6b6b6b; margin-bottom: 20px; }
    /* chart-legend-item inline */
    .chart-legend-item { display:inline-flex; gap:2px; align-items:center; padding:4px 0; cursor:pointer; }
    .chart-legend-item__favicon { width:14px; height:14px; border-radius:2px; flex-shrink:0; display:block; }
    .chart-legend-item__dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; display:inline-block; }
    .chart-legend-item__label { font-family:'Open Sans',sans-serif; font-stretch:condensed; font-size:13px; font-weight:400; color:#38476a; line-height:14px; white-space:nowrap; padding-bottom:2px; padding-left:2px; }
    .csd-series--off { opacity:0.35; }
    .csd-series--off .chart-legend-item__label { text-decoration:line-through; }
  </style>
</head>
<body>
  <div class="demo-card">
    <div class="demo-card__title">Timeline Chart</div>
    <div class="demo-card__sub">5 series · 30 data points · hover tooltip · legend toggle</div>
    <div class="timeline-chart" id="tc-demo">
      <div style="position:relative;">
        <svg class="timeline-chart__svg" id="tc-svg" viewBox="0 0 740 230" xmlns="http://www.w3.org/2000/svg">
          <line x1="36" y1="18"  x2="728" y2="18"  stroke="#dce3ef" stroke-width="1"/>
          <line x1="36" y1="64"  x2="728" y2="64"  stroke="#dce3ef" stroke-width="1"/>
          <line x1="36" y1="109" x2="728" y2="109" stroke="#dce3ef" stroke-width="1"/>
          <line x1="36" y1="155" x2="728" y2="155" stroke="#dce3ef" stroke-width="1"/>
          <line x1="36" y1="200" x2="728" y2="200" stroke="#dce3ef" stroke-width="1"/>
          <text class="tc-axis-label" x="32" y="22"  text-anchor="end" font-family="'Open Sans Condensed','Open Sans',sans-serif" font-stretch="condensed" font-size="13" fill="rgba(0,0,0,0.6)">40%</text>
          <text class="tc-axis-label" x="32" y="113" text-anchor="end" font-family="'Open Sans Condensed','Open Sans',sans-serif" font-stretch="condensed" font-size="13" fill="rgba(0,0,0,0.6)">20%</text>
          <text class="tc-axis-label" x="32" y="204" text-anchor="end" font-family="'Open Sans Condensed','Open Sans',sans-serif" font-stretch="condensed" font-size="13" fill="rgba(0,0,0,0.6)">0%</text>
          <text class="tc-axis-label" x="36"  y="222" text-anchor="start" font-family="'Open Sans Condensed','Open Sans',sans-serif" font-stretch="condensed" font-size="13" fill="rgba(0,0,0,0.6)">27 Apr, 2026</text>
          <text class="tc-axis-label" x="728" y="222" text-anchor="end"   font-family="'Open Sans Condensed','Open Sans',sans-serif" font-stretch="condensed" font-size="13" fill="rgba(0,0,0,0.6)">26 May, 2026</text>
          <g id="tc-lines"></g>
          <line id="tc-indicator" x1="0" y1="18" x2="0" y2="200" stroke="rgba(0,0,0,0.35)" stroke-width="1" stroke-dasharray="3,2" style="display:none"/>
          <rect id="tc-hit" x="36" y="18" width="692" height="182" fill="transparent" style="cursor:crosshair"/>
        </svg>
        <div id="tc-tooltip" class="timeline-chart__tooltip"></div>
      </div>
      <div id="tc-legend" class="timeline-chart__legend"></div>
    </div>
  </div>
  <script>
  (function(){
    var COLORS=['#b3a2e7','#64abfb','#d47dd4','#e86492','#8ac8b1'];
    var LABELS=['amazon.com','walmart.com','target.com','bestbuy.com','homedepot.com'];
    var FAVICONS=LABELS.map(function(d){return 'https://www.google.com/s2/favicons?domain='+d+'&sz=16';});
    var VALS=[
      [28,26,31,29,24,28,32,27,30,25,29,33,28,26,31,34,29,27,32,30,28,35,31,27,30,33,28,32,29,31],
      [18,20,17,22,19,23,21,18,24,20,19,22,25,21,18,24,20,23,19,22,26,18,23,20,22,25,19,21,24,20],
      [22,20,24,22,19,23,21,25,20,22,24,21,19,23,25,20,22,24,21,23,20,24,22,20,23,21,24,20,22,23],
      [16,18,15,19,17,14,18,20,16,19,17,15,18,21,16,19,17,20,18,16,19,15,18,17,20,16,19,17,18,15],
      [31,29,33,30,28,32,34,30,27,31,33,29,32,35,30,28,33,31,29,34,30,28,33,31,29,32,30,34,31,29]
    ];
    var N=30,X0=36,X1=728,Y0=18,Y1=200,YMAX=40,hidden={};
    var svg=document.getElementById('tc-svg'),linesG=document.getElementById('tc-lines'),legend=document.getElementById('tc-legend'),ind=document.getElementById('tc-indicator'),hit=document.getElementById('tc-hit'),tip=document.getElementById('tc-tooltip');
    var DATES=(function(){var d=[],base=new Date('2026-04-27');for(var i=0;i<N;i++){var dt=new Date(base);dt.setDate(base.getDate()+i);d.push(dt.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}));}return d;})();
    function px(i){return X0+i/(N-1)*(X1-X0);}
    function py(v){return Y1-(v/YMAX)*(Y1-Y0);}
    function buildPath(vals){var t=0.35,pts=vals.map(function(v,i){return[px(i),py(v)];});var d='M'+pts[0][0].toFixed(1)+','+pts[0][1].toFixed(1);for(var i=0;i<N-1;i++){var p0=pts[Math.max(0,i-1)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(N-1,i+2)];d+=' C'+[p1[0]+(p2[0]-p0[0])*t,p1[1]+(p2[1]-p0[1])*t,p2[0]-(p3[0]-p1[0])*t,p2[1]-(p3[1]-p1[1])*t,p2[0],p2[1]].map(function(x){return x.toFixed(1);}).join(',');}return d;}
    function render(){linesG.innerHTML='';VALS.forEach(function(vals,ci){if(hidden[ci])return;var ns='http://www.w3.org/2000/svg',line=document.createElementNS(ns,'path');line.setAttribute('d',buildPath(vals));line.setAttribute('fill','none');line.setAttribute('stroke',COLORS[ci]);line.setAttribute('stroke-width','1.5');line.setAttribute('stroke-linecap','round');line.setAttribute('stroke-linejoin','round');line.dataset.ci=ci;linesG.appendChild(line);});linesG.querySelectorAll('path').forEach(function(l,i){var len=l.getTotalLength?l.getTotalLength():500;l.style.strokeDasharray=len;l.style.strokeDashoffset=len;l.style.transition='none';l.getBoundingClientRect();l.style.transition='stroke-dashoffset 800ms ease-out '+(i*60)+'ms';l.style.strokeDashoffset=0;});buildLegend();updateAxisLabels();}
    function buildLegend(){legend.innerHTML='';LABELS.forEach(function(label,ci){var item=document.createElement('div');item.className='chart-legend-item'+(hidden[ci]?' csd-series--off':'');item.style.cursor='pointer';item.dataset.ci=ci;item.innerHTML='<img class="chart-legend-item__favicon" src="'+FAVICONS[ci]+'"><span class="chart-legend-item__dot" style="background:'+COLORS[ci]+';"></span><span class="chart-legend-item__label">'+label+'</span>';item.addEventListener('click',function(){var idx=parseInt(item.dataset.ci);if(hidden[idx])delete hidden[idx];else hidden[idx]=true;item.classList.toggle('csd-series--off');render();});legend.appendChild(item);});}
    function updateAxisLabels(){var scale=svg.getBoundingClientRect().width/740;if(!scale)return;var svgPx=(13/scale).toFixed(2);svg.querySelectorAll('.tc-axis-label').forEach(function(t){t.setAttribute('font-size',svgPx);});}
    window.addEventListener('resize',updateAxisLabels);
    hit.addEventListener('mousemove',function(e){var r=svg.getBoundingClientRect(),sx=(e.clientX-r.left)*(740/r.width),idx=Math.max(0,Math.min(N-1,Math.round((sx-X0)/(X1-X0)*(N-1))));ind.setAttribute('x1',px(idx));ind.setAttribute('x2',px(idx));ind.style.display='block';var html='<div style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.7);margin-bottom:6px;letter-spacing:0.3px;">'+DATES[idx]+'</div>';var rows=VALS.map(function(v,ci){return{ci:ci,v:v[idx]};}).filter(function(r){return!hidden[r.ci];});rows.sort(function(a,b){return b.v-a.v;});rows.forEach(function(r){html+='<div style="display:flex;align-items:center;gap:6px;font-size:12px;color:#fff;line-height:1.8;"><span style="width:8px;height:8px;border-radius:50%;background:'+COLORS[r.ci]+';flex-shrink:0;display:inline-block;"></span><img src="'+FAVICONS[r.ci]+'" width="11" height="11" style="border-radius:2px;flex-shrink:0;"><span style="flex:1;white-space:nowrap;">'+LABELS[r.ci]+'</span><span style="font-weight:600;padding-left:8px;">'+r.v+'%</span></div>';});tip.innerHTML=html;tip.style.display='block';tip.style.left=(e.clientX+16)+'px';tip.style.top=(e.clientY-80)+'px';});
    hit.addEventListener('mouseleave',function(){ind.style.display='none';tip.style.display='none';});
    render();
  })();
  </script>
</body>
</html>
