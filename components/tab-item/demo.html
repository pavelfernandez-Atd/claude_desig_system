<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tab-item — Adthena DS Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wdth,wght@75,300;75,400;75,600;100,300;100,400;100,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tab-item.css">
</head>
<body style="padding:32px;background:#f0f2f5;font-family:'Open Sans',sans-serif">
<div style="display:flex;flex-direction:column;gap:24px">
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <div class="tab-item">Default</div>
    <div class="tab-item tab-item--active">Active</div>
    <div class="tab-item tab-item--disabled">Disabled</div>
    <div class="tab-item">Counter <span class="tab-item__counter">3</span></div>
    <div class="tab-item tab-item--active">Active <span class="tab-item__counter">7</span></div>
  </div>
</div>

</body>
</html>
