<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toggle — Adthena DS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap">
  <link rel="stylesheet" href="toggle.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Open Sans', Helvetica, sans-serif; background: #e5eef5; color: #27365b; padding: 40px 24px; }
    .demo-page { max-width: 680px; margin: 0 auto; display: flex; flex-direction: column; gap: 32px; }
    .demo-card { background: #fff; border-radius: 12px; padding: 24px; }
    .demo-card__title { font-size: 11px; font-weight: 600; color: #485982; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 20px; }
    .state-grid { display: grid; grid-template-columns: 80px repeat(4, 72px); gap: 0; }
    .state-grid__header { font-size: 10px; font-weight: 600; color: #858585; letter-spacing: 0.4px; text-transform: uppercase; margin-bottom: 12px; }
    .state-grid__row-label { font-size: 12px; font-weight: 600; color: #485982; display: flex; align-items: center; }
    .state-grid__cell { display: flex; align-items: center; padding: 10px 0; }
    .demo-list { display: flex; flex-direction: column; gap: 14px; }
    .demo-list__item { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #27365b; }
    .demo-list__item--disabled { color: #9e9e9e; }
    .section-label { font-size: 11px; font-weight: 600; color: #858585; letter-spacing: 0.4px; text-transform: uppercase; margin-bottom: 8px; }
    .with-label-group { display: flex; flex-direction: column; gap: 16px; }
    h1 { font-size: 22px; font-weight: 700; color: #063059; margin-bottom: 4px; }
    p.subtitle { font-size: 13px; color: #6b6b6b; }
  </style>
</head>
<body>
  <div class="demo-page">

    <div>
      <h1>Toggle</h1>
      <p class="subtitle">Adthena Design System · Figma node 167:1041</p>
    </div>

    <!-- ALL STATES -->
    <div class="demo-card">
      <div class="demo-card__title">All States</div>
      <div style="background:#f4f7fb;padding:20px;border-radius:8px">

        <div style="display:grid;grid-template-columns:80px repeat(4,72px);margin-bottom:10px">
          <div></div>
          <div class="state-grid__header">Default</div>
          <div class="state-grid__header">Hovered</div>
          <div class="state-grid__header">Pressed</div>
          <div class="state-grid__header">Disabled</div>
        </div>

        <!-- Off row -->
        <div style="display:grid;grid-template-columns:80px repeat(4,72px);align-items:center;margin-bottom:12px">
          <span class="state-grid__row-label">Off</span>
          <div><div class="ds-toggle"><div class="ds-toggle__thumb"></div></div></div>
          <div><div class="ds-toggle ds-toggle--hovered"><div class="ds-toggle__thumb"></div></div></div>
          <div><div class="ds-toggle ds-toggle--pressed"><div class="ds-toggle__thumb"></div></div></div>
          <div><div class="ds-toggle ds-toggle--disabled"><div class="ds-toggle__thumb"></div></div></div>
        </div>

        <!-- On row -->
        <div style="display:grid;grid-template-columns:80px repeat(4,72px);align-items:center">
          <span class="state-grid__row-label">On</span>
          <div><div class="ds-toggle ds-toggle--on"><div class="ds-toggle__thumb"></div></div></div>
          <div><div class="ds-toggle ds-toggle--on ds-toggle--hovered"><div class="ds-toggle__thumb"></div></div></div>
          <div><div class="ds-toggle ds-toggle--on ds-toggle--pressed"><div class="ds-toggle__thumb"></div></div></div>
          <div><div class="ds-toggle ds-toggle--on ds-toggle--disabled"><div class="ds-toggle__thumb"></div></div></div>
        </div>

      </div>
    </div>

    <!-- VARIANT — WITH LABEL -->
    <div class="demo-card">
      <div class="demo-card__title">Variant — With Label</div>
      <div class="with-label-group">

        <div>
          <div class="section-label" style="margin-bottom:10px">Off</div>
          <div class="ds-toggle-row">
            <div class="ds-toggle"><div class="ds-toggle__thumb"></div></div>
            <span class="ds-toggle-row__label">Gap Analysis</span>
          </div>
        </div>

        <div>
          <div class="section-label" style="margin-bottom:10px">On</div>
          <div class="ds-toggle-row">
            <div class="ds-toggle ds-toggle--on"><div class="ds-toggle__thumb"></div></div>
            <span class="ds-toggle-row__label">Gap Analysis</span>
          </div>
        </div>

        <div>
          <div class="section-label" style="margin-bottom:10px">Disabled</div>
          <div class="ds-toggle-row">
            <div class="ds-toggle ds-toggle--disabled"><div class="ds-toggle__thumb"></div></div>
            <span class="ds-toggle-row__label" style="color:#b0bac9">Gap Analysis</span>
          </div>
        </div>

      </div>
    </div>

    <!-- INTERACTIVE DEMO -->
    <div class="demo-card">
      <div class="demo-card__title">Interactive Demo</div>
      <div class="demo-list">

        <label class="ds-toggle-label">
          <input type="checkbox" class="ds-toggle-input" id="t1">
          <span id="t1-lbl">Gap Analysis — Off</span>
        </label>

        <label class="ds-toggle-label">
          <input type="checkbox" class="ds-toggle-input" id="t2" checked>
          <span id="t2-lbl">Show Competitors — On</span>
        </label>

        <label class="ds-toggle-label">
          <input type="checkbox" class="ds-toggle-input" id="t3">
          <span id="t3-lbl">Weekly Digest — Off</span>
        </label>

        <label class="ds-toggle-label ds-toggle-label--disabled">
          <input type="checkbox" class="ds-toggle-input" disabled>
          <span>AI Insights — disabled, off</span>
        </label>

        <label class="ds-toggle-label ds-toggle-label--disabled">
          <input type="checkbox" class="ds-toggle-input" disabled checked>
          <span>Auto-refresh — disabled, on</span>
        </label>

      </div>
    </div>

  </div>

  <script>
    [['t1','Gap Analysis'],['t2','Show Competitors'],['t3','Weekly Digest']].forEach(function(p) {
      var inp = document.getElementById(p[0]);
      var lbl = document.getElementById(p[0] + '-lbl');
      inp.addEventListener('change', function() {
        lbl.textContent = p[1] + (inp.checked ? ' — On' : ' — Off');
      });
    });
  </script>
</body>
</html>
